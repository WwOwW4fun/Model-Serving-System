# Stores non-sensitive configuration for the ML model serving API.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-model-config
  labels:
    app: ml-model-serving
    component: configuration
  annotations:
    description: "Configuration for ML model serving application"
    version: "1.0"

data:
  # Model runtime configuration.
  model_name: "resnet18"
  device: "cpu"
  batch_size: "1"
  warmup_iterations: "10"

  # API server configuration.
  port: "8000"
  workers: "1"
  log_level: "info"
  log_format: "json"

  # Inference request defaults and validation.
  max_image_size_mb: "10"
  default_top_k: "5"
  confidence_threshold: "0.0"
  allowed_image_types: "image/jpeg,image/png,image/jpg"

  # Optional feature switches.
  enable_metrics: "true"
  enable_cache: "false"
  enable_cors: "true"
  enable_rate_limit: "false"

  # Monitoring configuration.
  metrics_port: "8000"
  health_check_interval: "30"

  # Cache configuration, used only when caching is enabled.
  cache_size: "1000"
  cache_ttl_seconds: "300"

  # Rate limiting configuration, used only when rate limiting is enabled.
  rate_limit_requests: "100"
  rate_limit_window_seconds: "60"
