# Runs and manages the ML model serving API pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-model-serving-deployment
  labels:
    app: ml-model-serving
    version: v1.0
    tier: serving
    component: api

spec:
  # Keep two API pods running for basic availability.
  replicas: 2

  # Select the pods managed by this Deployment.
  selector:
    matchLabels:
      app: ml-model-serving
      tier: serving

  # Replace pods gradually during image/config updates.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  # Template for each API pod created by the Deployment.
  template:
    metadata:
      labels:
        app: ml-model-serving
        version: v1.0
        tier: serving
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"

    spec:
      containers:
      - name: ml-api
        image: ml-model-serving:v1.0
        imagePullPolicy: IfNotPresent

        # Expose the FastAPI HTTP port inside the pod.
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        # Configure the app without rebuilding the image.
        env:
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: ml-model-config
              key: model_name
        - name: DEVICE
          value: "cpu"
        - name: PORT
          value: "8000"
        - name: LOG_LEVEL
          value: "info"

        # Reserve and cap CPU/memory usage for stable scheduling.
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi

        # Restart the container if the app becomes unhealthy.
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Send traffic only after the app is ready.
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

# Deployment Instructions
# ==============================================================================
# To deploy:
# kubectl apply -f deployment.yaml
#
# To check deployment status:
# kubectl get deployments
# kubectl describe deployment ml-model-serving-deployment
#
# To check pods:
# kubectl get pods -l app=ml-model-serving
# kubectl logs -l app=ml-model-serving -f
#
# To scale:
# kubectl scale deployment ml-model-serving-deployment --replicas=5
#
# To update image:
# kubectl set image deployment/ml-model-serving-deployment ml-api=ml-model-serving:v2.0
#
# To rollback:
# kubectl rollout undo deployment/ml-model-serving-deployment
#
# To check rollout status:
# kubectl rollout status deployment/ml-model-serving-deployment
#
# ==============================================================================