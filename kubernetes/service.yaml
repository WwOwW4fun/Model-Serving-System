# Exposes the ML model serving pods through a stable network endpoint.
apiVersion: v1
kind: Service
metadata:
  name: ml-model-serving-service
  labels:
    app: ml-model-serving
    tier: serving
    component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

spec:
  # Creates an external endpoint when the cluster supports load balancers.
  type: LoadBalancer

  # Routes traffic to pods created by the matching Deployment.
  selector:
    app: ml-model-serving
    tier: serving

  # Expose HTTP on port 80 and forward it to the FastAPI container port.
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8000

  # Keep requests evenly distributed across ready pods.
  sessionAffinity: None
  externalTrafficPolicy: Cluster
